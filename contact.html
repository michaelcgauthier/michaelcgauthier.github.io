<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | Michael Gauthier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar lightbar">
    <div class="wrap topbar-inner">
      <div class="brandblock">
        <div class="brand">Michael Gauthier</div>
        <div class="subtitle">Mechanical Engineering Student</div>
      </div>

      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="projects.html">Projects</a>
        <a class="nav-link" href="resume.html">Resume</a>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link active" href="contact.html">Contact</a>
        <a class="icon-link" href="mailto:gauthier.mi@northeastern.edu" aria-label="Email">✉</a>
        <a class="icon-link" href="https://www.linkedin.com/in/mgauthier1" target="_blank" rel="noopener" aria-label="LinkedIn">in</a>
      </nav>
    </div>
  </header>

  <main class="surface">
    <section class="wrap section">
      <div class="page-head">
        <div>
          <h1 class="page-title">Contact</h1>
          <p class="p-muted">This form opens an email with your message filled in.</p>
        </div>
      </div>

      <div class="card" style="padding:18px;">
        <form id="contactForm" style="display:grid; gap:12px;">
          <label style="display:grid; gap:6px;">
            <span style="font-weight:900; font-size:13px;">Name</span>
            <input id="cName" required style="padding:10px 12px; border-radius:12px; border:1px solid rgba(2,8,23,.14);">
          </label>

          <label style="display:grid; gap:6px;">
            <span style="font-weight:900; font-size:13px;">Email</span>
            <input id="cEmail" type="email" required style="padding:10px 12px; border-radius:12px; border:1px solid rgba(2,8,23,.14);">
          </label>

          <label style="display:grid; gap:6px;">
            <span style="font-weight:900; font-size:13px;">Message</span>
            <textarea id="cMessage" rows="7" required style="padding:10px 12px; border-radius:12px; border:1px solid rgba(2,8,23,.14);"></textarea>
          </label>

          <button class="btn btn-primary" type="submit" style="justify-self:start;">Open email</button>
          <div class="p-muted" style="font-size:12px;">This site uses mailto and does not store messages.</div>
        </form>
      </div>

      <section class="footer">
        <div class="wrap footer-inner">
          <div>
            <div class="footer-name">Michael Gauthier</div>
            <div>
              <a href="mailto:gauthier.mi@northeastern.edu">gauthier.mi@northeastern.edu</a>
              <span class="sep">|</span>
              <a href="https://www.linkedin.com/in/mgauthier1" target="_blank" rel="noopener">LinkedIn</a>
            </div>
          </div>
          <div>© <span id="year"></span></div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
